name: Release PGQT Windows Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            arch: amd64
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        env:
          CARGO_INCREMENTAL: 0
        run: |
          cargo build --release --target ${{ matrix.target }} --no-default-features
        shell: pwsh

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pgqt.exe dist/pgqt.exe
        shell: pwsh

      - name: Create archive
        run: |
          cd dist
          Compress-Archive -Path pgqt.exe -DestinationPath pgqt-${{ github.event.inputs.version }}-windows-${{ matrix.arch }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgqt-windows-${{ matrix.arch }}
          path: dist/pgqt-${{ github.event.inputs.version }}-windows-${{ matrix.arch }}.zip

  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: PGQT ${{ github.event.inputs.version }} (Windows)
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            release/*.zip
            release/checksums.txt
          generate_release_notes: true
