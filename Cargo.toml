[package]
name = "postgresqlite"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
pgwire = "0.38"
rusqlite = { version = "0.38", features = ["bundled", "column_decltype", "functions", "cache"] }
pg_query = "6.1"
anyhow = "1.0"
dashmap = "6.1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
async-trait = "0.1"
bytes = "1.11.1"
clap = { version = "4.5", features = ["derive", "env"] }
regex = "1.10"
libc = "0.2"
chrono = "0.4"

[dev-dependencies]
serde_json = { version = "1.0", features = ["preserve_order"] }
