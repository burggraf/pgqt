[package]
name = "postgresqlite"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
pgwire = { version = "0.38", default-features = false, features = ["server-api-ring"] }
rusqlite = { version = "0.31", features = ["bundled"] }
sqlparser = "0.44"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
