version: '3.8'

services:
  pglite:
    build: .
    container_name: pglite-proxy
    ports:
      - "5432:5432"
    environment:
      - PG_LITE_DB=/data/myapp.db
      - PG_LITE_PORT=5432
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Optional: pgAdmin for web-based management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pglite-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - pglite
    restart: unless-stopped

volumes:
  pgadmin-data: